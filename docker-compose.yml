version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hive
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hive_dev}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HIVE__CHAIN__RPC_URL=${RPC_URL:-https://mainnet-rpc.axonchain.ai/}
      - HIVE__CHAIN__WS_URL=${WS_URL:-wss://mainnet-rpc.axonchain.ai/ws}
      - HIVE__CHAIN__PRIVATE_KEY=${OPERATOR_PRIVATE_KEY}
      - HIVE__MARKET__BINANCE_WS=wss://stream.binance.com:9443
      - HIVE__MARKET__OKX_WS=wss://ws.okx.com:8443
      - HIVE__MARKET__SYMBOL=BTCUSDT
      - HIVE__EXECUTION__MODE=${EXECUTION_MODE:-dryrun}
      - HIVE__API__HOST=0.0.0.0
      - HIVE__API__PORT=8080
      - DATABASE_URL=postgres://hive:${DB_PASSWORD:-hive_dev}@postgres:5432/hive
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=hive_engine=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    profiles:
      - monitoring

volumes:
  pg_data:
